<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安装向导 - VPS积分商城</title>
    <link rel="stylesheet" href="../css/install.css?v=20260315b">
</head>
<body>
<div class="install-box">
    <!-- 步骤指示器 -->
    <div class="step-indicator">
        <div class="step-dot active"></div>
        <div class="step-dot"></div>
        <div class="step-dot"></div>
    </div>

    <!-- 步骤1: 数据库配置 -->
    <div class="step-view active" data-step="1">
        <div class="step-label">步骤 1/3</div>
        <h1><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-3px;margin-right:4px"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg> 数据库配置</h1>
        <p class="subtitle">填写您的 MySQL 数据库连接信息</p><div id="step1Msg" class="msg-box"></div>

        <div class="form-row">
            <div class="form-group">
                <label>数据库地址</label>
                <input type="text" id="dbHost" value="localhost" placeholder="localhost">
            </div>
            <div class="form-group">
                <label>端口</label>
                <input type="number" id="dbPort" value="3306" placeholder="3306">
            </div>
        </div>
        <div class="form-group">
            <label>数据库用户名</label>
            <input type="text" id="dbUser" value="root" placeholder="root">
        </div>
        <div class="form-group">
            <label>数据库密码</label>
            <input type="password" id="dbPass" placeholder="留空表示无密码">
        </div>
        <div class="form-group">
            <label>数据库名称</label>
            <input type="text" id="dbName" value="vps_shop" placeholder="vps_shop">
            <div class="hint">如果数据库不存在，安装时会自动创建</div>
        </div>

        <button class="btn btn-outline" id="btnTest" onclick="testConnection()">测试连接</button>
        <button class="btn btn-primary" id="btnSave" onclick="saveAndNext()">保存配置并继续 →</button>
    </div>

    <!-- 步骤2: 加密密钥 -->
    <div class="step-view" data-step="2">
        <div class="step-label">步骤 2/3</div>
        <h1><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-3px;margin-right:4px"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> 加密密钥</h1>
        <p class="subtitle">用于加密 VPS 密码等敏感信息（可选）</p>

        <div id="step2Msg" class="msg-box"></div>

        <div class="encrypt-section">
            <h3><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-3px;margin-right:4px"><rect x="2" y="2" width="20" height="20" rx="3"/><circle cx="8" cy="8" r="1.5" fill="currentColor"/><circle cx="16" cy="8" r="1.5" fill="currentColor"/><circle cx="8" cy="16" r="1.5" fill="currentColor"/><circle cx="16" cy="16" r="1.5" fill="currentColor"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/></svg> 自动生成密钥</h3>
            <p>生成随机密钥并自动写入配置。不配置则 VPS 密码以明文存储。</p>
            <button class="btn btn-primary" id="btnGenKey" onclick="generateKey()">生成加密密钥</button></div>

        <div id="keyDisplay" class="key-box" style="display:none">
            <div class="key-label">生成的加密密钥（请备份）：</div>
            <code id="keyCode"></code>
            <button class="btn btn-outline" style="margin-top:12px" onclick="copyKey()"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;margin-right:2px"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg> 复制密钥</button>
        </div>

        <button class="btn btn-success" onclick="goToInstall()">继续安装 →</button><button class="btn btn-outline" onclick="goToInstall()">跳过，稍后配置</button>
    </div>

    <!-- 步骤3: 执行安装 -->
    <div class="step-view" data-step="3">
        <div class="step-label">步骤 3/3</div>
        <h1><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-3px;margin-right:4px"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="M12 15l-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></svg> 初始化数据库</h1>
        <p class="subtitle">点击下方按钮创建所有数据表</p>

        <div id="step3Msg" class="msg-box"></div>

        <button class="btn btn-primary" id="btnInstall" onclick="runInstall()">开始初始化</button>
        <button class="btn btn-outline" onclick="goStep(1)">← 返回修改配置</button>
    </div>

    <!-- 步骤4: 完成 -->
    <div class="step-view" data-step="4">
        <div class="success-box">
            <div class="success-icon"><svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="#22c55e" stroke-width="1.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
            <h1>数据库初始化成功！</h1>
            <p class="subtitle">正在跳转到管理员设置页面...</p>
        </div>
    </div>
</div>

<script src="../js/install.js"></script>
</body>
</html>
