<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理登录 - VPS积分商城</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/admin.css"><script>
        // 自动缓存破坏
        (function() {
            const v = Date.now();
            document.querySelectorAll('link[rel="stylesheet"]').forEach(link => {
                if (link.href && !link.href.includes('fonts.googleapis.com')) {
                    link.href = link.href.split('?')[0] + '?v=' + v;
                }
            });
        })();
    </script>
</head>
<body>
    <div class="auth-layout">
        <div class="auth-card">
            <div style="text-align:center;margin-bottom:32px">
                <div style="font-size:48px;margin-bottom:16px;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent"><svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
                <h1 style="font-size:24px;font-weight:700;color:var(--text-main);margin-bottom:8px">管理后台登录</h1>
                <p style="color:var(--text-muted);font-size:14px">请使用管理员账号登录系统</p>
            </div>
            
            <div class="form-group" style="margin-bottom:20px">
                <label style="display:block;margin-bottom:8px;font-size:13px;color:var(--text-muted)">用户名</label>
                <input type="text" id="username" placeholder="请输入管理员用户名" style="width:100%;padding:12px;border-radius:8px;border:1px solid var(--border);background:var(--bg-input);color:white">
            </div>
            <div class="form-group" style="margin-bottom:24px">
                <label style="display:block;margin-bottom:8px;font-size:13px;color:var(--text-muted)">密码</label>
                <input type="password" id="password" placeholder="请输入密码" style="width:100%;padding:12px;border-radius:8px;border:1px solid var(--border);background:var(--bg-input);color:white">
            </div>
            
            <button class="btn btn-primary" style="width:100%;padding:12px;font-size:14px" onclick="doLogin()">
                立即登录
            </button>
            
            <div style="text-align:center;margin-top:24px">
                <a href="../index.html" style="color:var(--text-muted);font-size:13px;text-decoration:none;transition:color 0.2s">
                    ← 返回商城首页
                </a>
            </div>
        </div>
    </div>

    <script>
        let csrfToken = '';
        function initCsrfToken() {
            return window.fetch('../api/csrf.php', { credentials: 'same-origin' })
                .then(r => r.json())
                .then(data => {
                    if (data.code === 1 && data.data && data.data.token) {
                        csrfToken = data.data.token;
                    }
                })
                .catch(() => {});
        }

        function apiFetch(url, options = {}) {
            const opts = { credentials: 'same-origin', ...options };
            const method = (opts.method || 'GET').toUpperCase();
            const ensureToken = (!csrfToken && method !== 'GET' && method !== 'HEAD') ? initCsrfToken() : Promise.resolve();
            return ensureToken.then(() => {
                const headers = new Headers(opts.headers || {});
                if (csrfToken && !headers.has('X-CSRF-Token')) {
                    headers.set('X-CSRF-Token', csrfToken);
                }
                opts.headers = headers;
                return window.fetch(url, opts);
            });
        }

        initCsrfToken();

        // 检查安装状态
        apiFetch('../api/check_install.php')
            .then(r => r.json())
            .then(data => {
                if (data.code === 1) {
if (!data.data.config_ok || !data.data.tables_ok) {
window.location.href = 'install.html';
                    } else if (!data.data.admin_ok) {
                        window.location.href = 'setup.html';
                    }
                }
            });

        // 检查是否已登录
        apiFetch('../api/admin.php?action=check')
            .then(r => r.json())
            .then(data => {
                if (data.code === 1) {
                    window.location.href = 'index.html';
                }
            });

        function doLogin() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;
            
            if (!user || !pass) {
                alert('请填写完整');
                return;
            }
            
            const body = new FormData();
            body.append('action', 'login');
            body.append('username', user);
            body.append('password', pass);
            
            apiFetch('../api/admin.php', { method: 'POST', body })
                .then(r => r.json())
                .then(data => {
                    if (data.code === 1) {
                        window.location.href = 'index.html';
                    } else {
                        alert(data.msg);
                    }
                });
        }

        document.getElementById('password').addEventListener('keypress', e => {
            if (e.key === 'Enter') doLogin();
        });
    </script>
</body>
</html>
